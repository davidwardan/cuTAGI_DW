seed: 1
data:
  paths:
    x_full: data/hq/ts_weekly_values_edited.csv
    dates_full: data/hq/ts_weekly_datetimes_edited.csv
    x_train: data/hq/train100/split_train_values.csv
    dates_train: data/hq/train100/split_train_datetimes.csv
    x_val: data/hq/split_val_values.csv
    dates_val: data/hq/split_val_datetimes.csv
    x_test: data/hq/split_test_values.csv
    dates_test: data/hq/split_test_datetimes.csv
  loader:
    num_features: 2
    time_covariates:
      - week_of_year
    scale_method: standard
    order_mode: by_window
    split_train_ratio: 0.7
    split_val_ratio: 0.15
    train_use_ratio: 1.0
    input_seq_len: 1
    look_back_len: 52
    batch_size: 64
    output_col:
      - 0
    nb_ts: 127
    ts_to_use: []
    carry_split_context: true
model:
  Sigma_v_bounds:
    - 0.5
    - 0.2
  decaying_factor: 0.9
  device: cuda
  hidden_sizes:
    - 40
    - 40
    - 40
  initialization:
    from_file: null
    variance_inject: 0.0
    variance_threshold: 1.0
    variance_action: add
training:
  num_epochs: 100
  early_stopping_criteria: rmse
  patience: 10
  min_delta: 0.0001
  warmup_epochs: 3
  shuffle: true
evaluation:
  eval_plots: false
  eval_metrics: true
  seansonal_period: 52
lookback_search:
  enabled: true
  candidate_values:
    - 4
    - 8
    - 12
    - 13
    - 16
    - 24
    - 26
    - 36
    - 52
  metric: rmse
  evaluate_best_on_test: true
