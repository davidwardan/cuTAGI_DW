seed: 1
data:
  paths:
    x_full: data/hq/ts_weekly_values_edited.csv
    dates_full: data/hq/ts_weekly_datetimes_edited.csv
    x_train: data/hq/train100/split_train_values.csv
    dates_train: data/hq/train100/split_train_datetimes.csv
    x_val: data/hq/split_val_values.csv
    dates_val: data/hq/split_val_datetimes.csv
    x_test: data/hq/split_test_values.csv
    dates_test: data/hq/split_test_datetimes.csv
  loader:
    num_features: 2
    time_covariates:
      - week_of_year
    scale_method: standard
    order_mode: shuffled
    split_train_ratio: 0.7
    split_val_ratio: 0.15
    train_use_ratio: 1.0
    input_seq_len: 52
    look_back_len: 1
    batch_size: 16
    output_col:
      - 0
    ts_to_use: []
    nb_ts: 127
    carry_split_context: true
    covariate_window_mode: all_steps
model:
  Sigma_v_bounds:
    - 1
    - 0.1
  decaying_factor: 0.5
  device: cpu
  cpu_threads: 16
  hidden_sizes:
    - 40
    - 40
    - 40
  sequential_model: true

training:
  num_epochs: 100
  early_stopping_criteria: rmse
  patience: 10
  min_delta: 0.0001
  warmup_epochs: 3
  shuffle: true
embeddings:
  standard:
    embedding_size: 10
    embedding_initializer: normal
evaluation:
  eval_plots: false
  eval_metrics: true
  seansonal_period: 52
  embed_plots: false
